# PixelVault - nginx reverse proxy with SSL (use after certbot setup)
# Replace YOUR_DOMAIN with your actual domain (e.g., pixelvault.example.xyz)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=evm_rpc:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=cosmos_rpc:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=cosmos_rest:10m rate=20r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # EVM JSON-RPC
    location /evm-rpc {
        limit_req zone=evm_rpc burst=50 nodelay;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://127.0.0.1:8545/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
    }

    # Cosmos RPC
    location /cosmos-rpc {
        limit_req zone=cosmos_rpc burst=30 nodelay;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        rewrite ^/cosmos-rpc(/.*)$ $1 break;
        rewrite ^/cosmos-rpc$ / break;

        proxy_pass http://127.0.0.1:26657;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Cosmos REST
    location /cosmos-rest {
        limit_req zone=cosmos_rest burst=30 nodelay;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        rewrite ^/cosmos-rest(/.*)$ $1 break;
        rewrite ^/cosmos-rest$ / break;

        proxy_pass http://127.0.0.1:1317;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Block everything else
    location / {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }
}
