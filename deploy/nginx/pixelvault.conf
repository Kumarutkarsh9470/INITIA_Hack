# PixelVault - nginx reverse proxy for Initia MiniEVM node
# Sits in front of EVM RPC (8545), Cosmos RPC (26657), Cosmos REST (1317)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=evm_rpc:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=cosmos_rpc:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=cosmos_rest:10m rate=20r/s;

# --- HTTP server (redirect to HTTPS if SSL is configured) ---
server {
    listen 80;
    server_name _;

    # Health check (always available on HTTP)
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # EVM JSON-RPC
    location /evm-rpc {
        limit_req zone=evm_rpc burst=50 nodelay;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://127.0.0.1:8545/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
    }

    # Cosmos RPC (Tendermint RPC)
    location /cosmos-rpc {
        limit_req zone=cosmos_rpc burst=30 nodelay;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Strip /cosmos-rpc prefix
        rewrite ^/cosmos-rpc(/.*)$ $1 break;
        rewrite ^/cosmos-rpc$ / break;

        proxy_pass http://127.0.0.1:26657;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Cosmos REST (LCD / API)
    location /cosmos-rest {
        limit_req zone=cosmos_rest burst=30 nodelay;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Strip /cosmos-rest prefix
        rewrite ^/cosmos-rest(/.*)$ $1 break;
        rewrite ^/cosmos-rest$ / break;

        proxy_pass http://127.0.0.1:1317;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Block everything else
    location / {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }
}
